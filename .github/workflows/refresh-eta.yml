name: Refresh procurement data

on:
  schedule:
    - cron: "15 * * * *"   # hourly at :15
  workflow_dispatch:
  push:
    branches: [claude/upbeat-pascal-BR7lI]
    paths:
      - ".github/workflows/refresh-eta.yml"
      - "scripts/build_procurement.py"

permissions:
  contents: write

concurrency:
  group: refresh-procurement
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/upbeat-pascal-BR7lI

      - name: Fetch procurement source sheet
        run: |
          curl -sSL --fail \
            "https://docs.google.com/spreadsheets/d/1FGsAgYm72Sttg9zK-eGMqnbbIB4d71rDyrpUupAV4OE/export?format=csv&gid=0" \
            -o procurement-source.csv
          test -s procurement-source.csv

      - name: Fetch BNA1 inventory sheet
        run: |
          curl -sSL --fail \
            "https://docs.google.com/spreadsheets/d/1sPEc5rBdRB9qaJijBh4z8DK4ZVo--5xmTGbPTZ5n2nQ/export?format=csv&gid=1794766977" \
            -o bna1-inventory.csv
          test -s bna1-inventory.csv

      - name: Build procurement.json
        run: python3 scripts/build_procurement.py procurement-source.csv bna1-inventory.csv procurement.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- procurement.json; then
            echo "No procurement changes."
            exit 0
          fi
          git add procurement.json
          git commit -m "chore: refresh procurement data ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push origin claude/upbeat-pascal-BR7lI

      - name: Clean up
        if: always()
        run: rm -f procurement-source.csv bna1-inventory.csv
