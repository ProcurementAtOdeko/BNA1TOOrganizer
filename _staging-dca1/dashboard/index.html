<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#FFD100" />
<title>Odeko · DCA1 On Hand &amp; ETA</title>
<link rel="icon" type="image/png" href="./odeko-logo.png" />
<link rel="apple-touch-icon" href="./odeko-logo.png" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #FBF7EC;
    --panel: #FFFFFF;
    --panel-2: #F5EFE0;
    --line: #E6DFCC;
    --ink: #2A1408;
    --ink-2: #40180B;
    --muted: #8A7B6A;
    --accent: #40180B;
    --accent-yellow: #FFD100;
    --green: #1F7A33;
    --green-soft: rgba(31,122,51,.12);
    --red: #B42318;
    --red-soft: rgba(180,35,24,.10);
    --amber: #B5660A;
    --amber-soft: rgba(181,102,10,.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    background: var(--panel); position: sticky; top: 0; z-index: 10;
  }
  header .brand { display: flex; align-items: center; gap: 14px; }
  header .logo { width: 40px; height: 40px; border-radius: 8px; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -.01em; color: var(--ink-2); }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  main { padding: 20px 24px 60px; max-width: 1600px; margin: 0 auto; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; }
  .kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .kpi .value { font-size: 24px; font-weight: 700; margin-top: 4px; color: var(--ink-2); letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
  .kpi.red .value { color: var(--red); }
  .kpi.amber .value { color: var(--amber); }
  .kpi.green .value { color: var(--green); }
  .kpi.accent { border-left: 3px solid var(--accent-yellow); }

  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
  .card h3 {
    margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-2);
  }
  .card .body { padding: 16px; }
  .card.tall .body { height: 460px; position: relative; }
  .card.chart .body { height: 280px; position: relative; }
  .card.full { grid-column: 1 / -1; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); align-items: center; background: var(--bg);
  }
  .toolbar input[type=text], .toolbar input[type=search] {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; min-width: 220px;
    font-family: inherit;
  }
  .toolbar input:focus { border-color: var(--ink-2); box-shadow: 0 0 0 3px rgba(64,24,11,.08); }
  .toolbar .count { color: var(--muted); font-size: 12px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; }
  th {
    color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase;
    letter-spacing: .06em; cursor: pointer; user-select: none; background: var(--bg);
  }
  th:hover { color: var(--ink-2); }
  th.sort-asc::after { content: " ▲"; color: var(--accent); }
  th.sort-desc::after { content: " ▼"; color: var(--accent); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #FAF4E4; }
  .cover-bad { color: var(--red); font-weight: 600; }
  .cover-warn { color: var(--amber); font-weight: 600; }
  .cover-good { color: var(--green); }
  .uuid { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; margin-top: 2px; }

  @media (max-width: 700px) {
    header { padding: 12px 14px; }
    header .logo { width: 32px; height: 32px; }
    header h1 { font-size: 15px; }
    main { padding: 14px 12px 40px; }
    th, td { padding: 7px 8px; font-size: 12px; }
    .kpi .value { font-size: 20px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="logo" src="./odeko-logo.png" alt="Odeko" width="40" height="40" />
    <div>
      <h1>DCA1 — On Hand &amp; ETA</h1>
      <div class="sub" id="meta">Loading…</div>
    </div>
  </div>
</header>

<main>
  <section class="kpis" id="kpis"></section>

  <section class="charts">
    <div class="card chart">
      <h3>Days of Cover Distribution</h3>
      <div class="body"><canvas id="chart-cover"></canvas></div>
    </div>
    <div class="card chart">
      <h3>Top 10 Vendors — On-Hand</h3>
      <div class="body"><canvas id="chart-vendors"></canvas></div>
    </div>
    <div class="card tall full">
      <h3>Top 20 At-Risk Items (Lowest Days of Cover)</h3>
      <div class="body"><canvas id="chart-risk"></canvas></div>
    </div>
  </section>

  <section class="card">
    <h3>All Items</h3>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search item or vendor…" />
      <span class="count" id="table-count"></span>
    </div>
    <div style="overflow-x:auto">
      <table id="items">
        <thead>
          <tr>
            <th data-sort="name">Item</th>
            <th data-sort="vendor">Vendor</th>
            <th class="num" data-sort="onHand">On Hand</th>
            <th class="num" data-sort="qtyOnOrder">On Order</th>
            <th class="num" data-sort="consumption60">60-Day Consumption</th>
            <th class="num" data-sort="daysOfCover" data-default="asc">Days of Cover</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const fmt = (n) =>
  n == null ? "—" :
  Math.abs(n) >= 1000 ? n.toLocaleString(undefined, { maximumFractionDigits: 0 })
                      : n.toLocaleString(undefined, { maximumFractionDigits: 1 });

const coverClass = (d) =>
  d == null ? "" : d < 7 ? "cover-bad" : d < 14 ? "cover-warn" : "cover-good";

const PALETTE = {
  ink: "#40180B", muted: "#8A7B6A", line: "#E6DFCC",
  green: "#1F7A33", amber: "#B5660A", red: "#B42318", yellow: "#FFD100", neutral: "#A89684",
};

let DATA = null;
let sortKey = "daysOfCover";
let sortDir = "asc";
let filterText = "";

async function load() {
  const res = await fetch("./data.json", { cache: "no-store" });
  if (!res.ok) { document.getElementById("meta").textContent = "Failed to load data.json"; return; }
  DATA = await res.json();
  document.getElementById("meta").textContent =
    `Updated ${new Date(DATA.generatedAt).toLocaleString()} · ${DATA.summary.itemCount} items`;
  renderKpis();
  renderCharts();
  renderTable();
}

function renderKpis() {
  const s = DATA.summary;
  const kpis = [
    { label: "Total Items", value: s.itemCount, cls: "accent" },
    { label: "Low Cover (<14d)", value: s.lowCoverCount, cls: s.lowCoverCount > 0 ? "red" : "green" },
    { label: "Avg Days of Cover", value: s.avgDaysOfCover, cls: s.avgDaysOfCover < 14 ? "amber" : "" },
    { label: "No Incoming PO/TO", value: s.noIncomingCount, cls: s.noIncomingCount > 0 ? "amber" : "green" },
  ];
  document.getElementById("kpis").innerHTML = kpis.map(k =>
    `<div class="kpi ${k.cls}"><div class="label">${k.label}</div><div class="value">${fmt(k.value)}</div></div>`
  ).join("");
}

function renderCharts() {
  Chart.defaults.color = PALETTE.muted;
  Chart.defaults.borderColor = PALETTE.line;
  Chart.defaults.font.family = '"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

  const cd = DATA.coverDistribution;
  new Chart(document.getElementById("chart-cover"), {
    type: "bar",
    data: {
      labels: cd.map(b => b.bucket + " days"),
      datasets: [{
        data: cd.map(b => b.count),
        backgroundColor: cd.map(b =>
          b.bucket === "<7" ? PALETTE.red :
          b.bucket === "7-14" ? PALETTE.amber :
          b.bucket === "unknown" ? PALETTE.neutral : PALETTE.green
        ),
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
    },
  });

  const tv = DATA.topVendorsOnHand;
  new Chart(document.getElementById("chart-vendors"), {
    type: "bar",
    data: {
      labels: tv.map(v => v.vendor.length > 24 ? v.vendor.slice(0, 22) + "…" : v.vendor),
      datasets: [{ data: tv.map(v => v.onHand), backgroundColor: PALETTE.ink, borderRadius: 4 }],
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true } },
    },
  });

  const risk = DATA.items.filter(i => i.daysOfCover != null).slice(0, 20);
  new Chart(document.getElementById("chart-risk"), {
    type: "bar",
    data: {
      labels: risk.map(i => i.name.length > 50 ? i.name.slice(0, 48) + "…" : i.name),
      datasets: [{
        data: risk.map(i => i.daysOfCover),
        backgroundColor: risk.map(i => i.daysOfCover < 7 ? PALETTE.red : i.daysOfCover < 14 ? PALETTE.amber : PALETTE.green),
        borderRadius: 4,
      }],
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `${c.raw} days` } } },
      scales: { x: { beginAtZero: true, title: { display: true, text: "Days of Cover" } } },
    },
  });
}

function renderTable() {
  const q = filterText.toLowerCase();
  let rows = DATA.items.filter(i =>
    !q || i.name.toLowerCase().includes(q) || (i.vendor || "").toLowerCase().includes(q)
  );

  rows.sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "string") return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === "asc" ? av - bv : bv - av;
  });

  document.getElementById("table-count").textContent =
    `${rows.length}${rows.length !== DATA.items.length ? ` of ${DATA.items.length}` : ""} items`;

  document.querySelectorAll("th").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.sort === sortKey) th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
  });

  document.querySelector("#items tbody").innerHTML = rows.map(i => `
    <tr>
      <td>${escapeHtml(i.name)}<div class="uuid">${i.uuid.slice(0, 8)}</div></td>
      <td>${escapeHtml(i.vendor || "")}</td>
      <td class="num">${fmt(i.onHand)}</td>
      <td class="num">${fmt(i.qtyOnOrder)}</td>
      <td class="num">${fmt(i.consumption60)}</td>
      <td class="num ${coverClass(i.daysOfCover)}">${fmt(i.daysOfCover)}</td>
    </tr>
  `).join("");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}

document.getElementById("search").addEventListener("input", (e) => {
  filterText = e.target.value;
  renderTable();
});

document.querySelectorAll("th[data-sort]").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
    else { sortKey = key; sortDir = th.dataset.default || "desc"; }
    renderTable();
  });
});

load();
</script>
</body>
</html>
